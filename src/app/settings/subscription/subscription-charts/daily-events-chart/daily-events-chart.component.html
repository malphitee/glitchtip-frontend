<mat-card appearance="outlined" class="daily-chart-card">
  <mat-card-content>
    <div class="chart-header">
      <span class="body-text-strong" i18n>Number of Events</span>
      <div class="chart-legend">
        <span class="legend-item">
          <span class="legend-swatch legend-swatch--performance"></span>
          <span i18n>Performance</span>
        </span>
        <span class="legend-item">
          <span class="legend-swatch legend-swatch--issues"></span>
          <span i18n>Issues</span>
        </span>
        <span class="legend-item">
          <span class="legend-swatch legend-swatch--projected"></span>
          <span i18n>Projected</span>
        </span>
      </div>
    </div>
    <div class="chart-container" #containerRef>
      <ngx-charts-bar-vertical-stacked
        [results]="chartData()"
        [view]="view()"
        [customColors]="customColors"
        [xAxis]="true"
        [yAxis]="true"
        [animations]="true"
        [showXAxisLabel]="false"
        [showYAxisLabel]="false"
        [legend]="false"
        [barPadding]="4"
        [xAxisTickFormatting]="xAxisTickFormatting"
        [noBarWhenZero]="false"
      >
        <ng-template #tooltipTemplate let-model="model">
          <div class="tooltip">
            <div>{{ model.name }}: {{ model.value }}</div>
          </div>
        </ng-template>
      </ngx-charts-bar-vertical-stacked>
    </div>
    <div class="chart-footer">
      <span class="caption-text">{{ periodRange() }}</span>
      @if (predictedTotal() !== null) {
        <span class="caption-text" i18n>Predicted end of month: ~{{ predictedTotal() }}</span>
      }
    </div>
  </mat-card-content>
</mat-card>

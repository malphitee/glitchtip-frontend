<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>{{ data.message }}</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button color="primary" (click)="respond(true)">
    {{ data.confirmText }}
  </button>
  <button mat-button (click)="respond(false)">
    {{ data.cancelText || defaultCancelText }}
  </button>
</mat-dialog-actions>

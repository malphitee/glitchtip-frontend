<mat-card appearance="outlined" class="upgrade-banner">
  <mat-card-content>
    <div class="banner-content">
      <h2 class="banner-headline fancy" i18n>Don't lose events!</h2>
      @if (usagePercent() !== null) {
        <p class="banner-usage" i18n>
          You're at <strong>{{ usagePercent() }}%</strong> of your limit. Upgrade to Starter now.
        </p>
      }
      <p class="banner-description" i18n>Support open source and get 100k events/month, priority support, and extended retention.</p>
      <div class="banner-actions">
        <button mat-flat-button color="primary" (click)="onUpgrade()" i18n>
          Upgrade Now
        </button>
        <a
          mat-stroked-button
          [href]="comparePlansUrl()"
          target="_blank"
          i18n
        >
          Compare Plans
        </a>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<gt-top-app-bar>
  <ng-container slot="left">
    <gt-list-title
      title="Uptime Monitors"
      [searchHits]="paginator()?.count"
    ></gt-list-title>
  </ng-container>

  <ng-container slot="right">
    <a id="add-monitor" class="add-monitor-button" mat-flat-button color="primary" [routerLink]="['new']">
      <mat-icon>add</mat-icon>
      <span class="add-monitor-text-long" i18n>Add monitor</span>
      <span class="add-monitor-text-short" i18n>Add</span>
    </a>
  </ng-container>
</gt-top-app-bar>
<section class="l-body l-body--full-width mat-elevation-z0">
  @if (monitors(); as monitors) {
    <div class="wrapper">
      <div class="table-container">
        <table mat-table [dataSource]="monitors" class="mat-elevation-z2">
          <ng-container matColumnDef="pagination">
            <th
              mat-header-cell
              *matHeaderCellDef
              [attr.colspan]="displayedColumns().length"
              class="table-header__actions"
            >
              <div class="pagination-container">
                <gt-pagination-buttons
                  [paginator]="paginator()"
                  [loading]="loading()"
                />
              </div>
            </th>
          </ng-container>
          <ng-container matColumnDef="name">
            <td
              mat-cell
              class="status-color--{{ monitor.isUp }}"
              *matCellDef="let monitor"
            >
              <div class="name-and-url-container">
                <div (mouseover)="checkIfTooltipIsNecessary($event)">
                  <a
                    [matTooltip]="monitor.name"
                    class="table-group-label"
                    matTooltipPosition="above"
                    [matTooltipDisabled]="tooltipDisabled"
                    [routerLink]="[monitor.id]"
                    >{{ monitor.name }}</a
                  >
                </div>
                <div (mouseover)="checkIfTooltipIsNecessary($event)">
                  <a
                    href="{{ monitor.url }}"
                    target="_blank"
                    class="caption-text monitor-link"
                    [matTooltip]="monitor.url"
                    matTooltipPosition="above"
                    [matTooltipDisabled]="tooltipDisabled"
                    >{{ monitor.url }}
                  </a>
                </div>
              </div>
            </td>
          </ng-container>
          <ng-container matColumnDef="checkChart">
            <td mat-cell *matCellDef="let monitor" class="chart-container">
              <div class="monitor-chart">
                <gt-monitor-chart [data]="monitor.checks"></gt-monitor-chart>
              </div>
            </td>
          </ng-container>
          <ng-container matColumnDef="status">
            <td mat-cell *matCellDef="let monitor">
              @if (monitor.isUp) {
                <span>Up</span>
              }
              @if (monitor.isUp === false) {
                <span>Down</span>
              }
              @if (monitor.lastChange) {
                {{ monitor.lastChange | timeFor }}
              }
            </td>
          </ng-container>
          <tr
            mat-header-row
            *matHeaderRowDef="['pagination']; sticky: true"
            class="table-header"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns()"
            class="monitor-row"
          ></tr>
          <tr class="mat-row" *matNoDataRow>
            <td
              class="zero-states-cell"
              [attr.colspan]="displayedColumns().length"
            >
              @if (!loading()) {
                <div i18n class="body-text-strong table-empty-states">
                  No monitors were found.
                </div>
              }
            </td>
          </tr>
        </table>
      </div>
    </div>
  }
</section>

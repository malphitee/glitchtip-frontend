<gt-top-app-bar>
  <ng-container slot="left">
    <gt-back-link backLinkText="View all uptime monitors" />
  </ng-container>
</gt-top-app-bar>
<section class="l-body">
  <gt-detail-header [title]="['Create a New Uptime Monitor', null]" />
  <gt-monitor-form
    [loading]="loading() === true"
    [formError]="error()"
    (formSubmitted)="submit($event)"
  ></gt-monitor-form>
</section>

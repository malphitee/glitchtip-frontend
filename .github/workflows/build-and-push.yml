name: Build GlitchTip (zh) & Push to Docker Hub

# 手动触发(Actions 页 Run workflow，可填版本)，或推送到 master 时自动构建。
on:
  workflow_dispatch:
    inputs:
      glitchtip_version:
        description: "官方后端镜像版本 glitchtip/glitchtip:<tag>（与你部署的一致）"
        required: true
        default: "latest"
      image_tag:
        description: "推送到 Docker Hub 的 tag"
        required: true
        default: "latest"
      platforms:
        description: "目标架构（多架构 linux/amd64,linux/arm64；也可只填一个）"
        required: true
        default: "linux/amd64,linux/arm64"
  push:
    branches: [master]
    # 纯文档/翻译工具改动不重建镜像（翻译本体在 src/，仍会触发）
    paths-ignore:
      - "**.md"
      - "zh-l10n/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve build args
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "glitchtip_version=latest"            >> "$GITHUB_OUTPUT"
            echo "image_tag=latest"                    >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64,linux/arm64"   >> "$GITHUB_OUTPUT"
          else
            echo "glitchtip_version=${{ inputs.glitchtip_version }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}"                 >> "$GITHUB_OUTPUT"
            echo "platforms=${{ inputs.platforms }}"                 >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.zh
          push: true
          platforms: ${{ steps.vars.outputs.platforms }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/glitchtip-zh:${{ steps.vars.outputs.image_tag }}
          build-args: |
            GLITCHTIP_VERSION=${{ steps.vars.outputs.glitchtip_version }}
            NPM_REGISTRY=https://registry.npmjs.org
          cache-from: type=gha
          cache-to: type=gha,mode=max
